<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Three.js Texture Loader Integration Test</title>
	<!-- Load Three.js from node_modules relative path -->
	<script src="../../node_modules/three/build/three.js"></script>
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<style>
		body {
			margin: 0;
			overflow: hidden;
			background-color: #000;
		}
		canvas {
			width: 100vw;
			height: 100vh;
			display: block;
		}
	</style>
</head>
<body>
	<canvas id="gl-canvas"></canvas>
	<script>
		window.testResult = { success: false, errors: [] };

		window.addEventListener('error', (event) => {
			window.testResult.errors.push(event.message || event.error.toString());
		});

		try {
			if (typeof THREE === 'undefined') {
				throw new Error('Three.js failed to load.');
			}

			const canvas = document.getElementById('gl-canvas');
			
			// Set up scene, camera, and renderer
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
			camera.position.z = 3;

			const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
			renderer.setSize(window.innerWidth, window.innerHeight);

			// Instantiate TextureLoader to load a real editor asset texture
			const loader = new THREE.TextureLoader();
			const textureUrl = '../../docs/editor/files/default.png';

			loader.load(
				textureUrl,
				// onLoad callback
				function (texture) {
					try {
						// Create plane with the texture applied
						const geometry = new THREE.PlaneGeometry(2, 2);
						const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
						const mesh = new THREE.Mesh(geometry, material);
						scene.add(mesh);

						// Render frame
						renderer.render(scene, camera);

						// Validate WebGL context
						const gl = renderer.getContext();
						if (!gl) {
							throw new Error('WebGL context could not be acquired.');
						}

						// Read center pixel to confirm we rendered something from the texture
						const pixel = new Uint8Array(4);
						gl.readPixels(
							window.innerWidth / 2,
							window.innerHeight / 2,
							1, 1,
							gl.RGBA,
							gl.UNSIGNED_BYTE,
							pixel
						);

						// Confirm the image is successfully loaded and dimensions are valid
						const textureLoadedSuccessfully = texture.image && texture.image.width > 0 && texture.image.height > 0;
						
						// Confirm that some colors were drawn to the canvas (non-black)
						const pixelIsRendered = (pixel[0] > 0 || pixel[1] > 0 || pixel[2] > 0);

						window.testResult = {
							success: textureLoadedSuccessfully && pixelIsRendered,
							textureWidth: texture.image.width,
							textureHeight: texture.image.height,
							pixelData: Array.from(pixel),
							glVersion: gl.getParameter(gl.VERSION),
							glRenderer: gl.getParameter(gl.RENDERER),
							errors: window.testResult.errors
						};
					} catch (err) {
						window.testResult = {
							success: false,
							error: err.message || err.toString(),
							errors: window.testResult.errors
						};
					}
				},
				// onProgress callback
				undefined,
				// onError callback
				function (err) {
					window.testResult = {
						success: false,
						error: 'Failed to load texture default.png',
						errors: [...window.testResult.errors, err.toString()]
					};
				}
			);
		} catch (error) {
			window.testResult = {
				success: false,
				error: error.message || error.toString(),
				errors: window.testResult.errors
			};
		}
	</script>
</body>
</html>
