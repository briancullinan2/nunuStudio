<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Three.js WebGL Integration Test</title>
	<!-- Load Three.js from node_modules relative path -->
	<script src="../../node_modules/three/build/three.js"></script>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			background-color: #000;
		}
		canvas {
			width: 100vw;
			height: 100vh;
			display: block;
		}
	</style>
</head>
<body>
	<canvas id="gl-canvas"></canvas>
	<script>
		window.testResult = { success: false, errors: [] };

		window.addEventListener('error', (event) => {
			window.testResult.errors.push(event.message || event.error.toString());
		});

		try {
			if (typeof THREE === 'undefined') {
				throw new Error('Three.js failed to load.');
			}

			const canvas = document.getElementById('gl-canvas');
			
			// Set up scene, camera, and renderer
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
			camera.position.z = 5;

			const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
			renderer.setSize(window.innerWidth, window.innerHeight);

			// Add a green cube
			const geometry = new THREE.BoxGeometry(2, 2, 2);
			const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
			const cube = new THREE.Mesh(geometry, material);
			scene.add(cube);

			// Render a frame
			renderer.render(scene, camera);

			// Validate WebGL context
			const gl = renderer.getContext();
			if (!gl) {
				throw new Error('WebGL context could not be created.');
			}

			// Verify that pixels were actually rendered
			// Read pixel from the center of the canvas
			const pixel = new Uint8Array(4);
			gl.readPixels(
				window.innerWidth / 2,
				window.innerHeight / 2,
				1, 1,
				gl.RGBA,
				gl.UNSIGNED_BYTE,
				pixel
			);

			// Since the cube is green (0x00ff00) and in the center, 
			// the green channel (index 1) should be non-zero (specifically 255)
			const isGreenRendered = pixel[1] > 0;

			window.testResult = {
				success: isGreenRendered,
				pixelData: Array.from(pixel),
				glVersion: gl.getParameter(gl.VERSION),
				glVendor: gl.getParameter(gl.VENDOR),
				glRenderer: gl.getParameter(gl.RENDERER),
				errors: window.testResult.errors
			};
		} catch (error) {
			window.testResult = {
				success: false,
				error: error.message || error.toString(),
				errors: window.testResult.errors
			};
		}
	</script>
</body>
</html>
